<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Directory | Academic Vitality</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: { extend: { colors: { "primary": "#340075", "primary-container": "#4c1d95", "surface-container-low": "#f6f2ff", "on-surface": "#181445", "on-surface-variant": "#4a4452" } } }
        }
    </script>
    <style> body { font-family: 'Manrope', sans-serif; min-height: 100dvh; background-color: #fcf8ff; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } </style>
</head>
<body class="flex flex-col text-on-surface">
    <header class="w-full sticky top-0 z-50 bg-white shadow-sm flex justify-between items-center px-6 h-20 border-b">
        <div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">AV</div><h1 class="text-2xl font-bold text-primary">Academic Vitality</h1></div>
    </header>

    <div class="flex flex-1">
        <aside class="w-72 bg-surface-container-low p-6 border-r flex flex-col gap-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a href="directory.html" class="flex items-center gap-3 px-4 py-3 bg-primary-container text-white rounded-xl font-bold"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">group</span><span>Directory</span></a>
            <a href="attendance.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">fingerprint</span><span>Attendance</span></a>
            <a href="id-cards.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">badge</span><span>ID Design</span></a>
            <a href="reports.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">analytics</span><span>Reports</span></a>
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-primary/5 rounded-xl transition-all"><span class="material-symbols-outlined">settings</span><span>Settings</span></a>
        </aside>

        <main class="flex-grow p-8 space-y-6">
            <div class="flex justify-between items-center">
                <div><h2 class="text-3xl font-bold text-primary">Academic Directory</h2><p class="text-on-surface-variant">Manage students, faculty, and institutional staff.</p></div>
                <button class="bg-primary text-white font-bold px-5 py-3 rounded-xl flex items-center gap-2 hover:shadow-lg transition-all"><span class="material-symbols-outlined">person_add</span>Add New Record</button>
            </div>

            <!-- Directory Grid Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Card 1 -->
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex flex-col items-center text-center">
                    <img class="w-20 h-20 rounded-full object-cover mb-4" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=256" alt="Kasun"/>
                    <h3 class="text-lg font-bold">Kasun Perera</h3>
                    <p class="text-sm text-primary font-medium">Grade 10 - B</p>
                    <p class="text-xs text-on-surface-variant mt-1">ID: STU-2024-001</p>
                </div>
                <!-- Card 2 -->
                <div class="bg-white p-6 rounded-2xl border shadow-sm flex flex-col items-center text-center">
                    <img class="w-20 h-20 rounded-full object-cover mb-4" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=256" alt="Sarah"/>
                    <h3 class="text-lg font-bold">Sarah Connor</h3>
                    <p class="text-sm text-primary font-medium">Faculty (Science)</p>
                    <p class="text-xs text-on-surface-variant mt-1">ID: TEA-2024-042</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
